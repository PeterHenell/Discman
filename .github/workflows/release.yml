name: Build & Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    name: Build and publish release APK
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Optional: decode keystore from secret ──────────────────────────────
      - name: Decode keystore
        id: keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="${{ runner.temp }}/release.keystore"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── Determine version tag ──────────────────────────────────────────────
      - name: Compute release tag
        id: tag
        run: |
          VERSION_NAME=$(grep -oP '(?<=versionName = ")[^"]+' app/build.gradle.kts || echo "1.0")
          VERSION_CODE=$(grep -oP '(?<=versionCode = )\d+' app/build.gradle.kts || echo "1")
          TAG="v${VERSION_NAME}-${VERSION_CODE}-build${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Release ${TAG}" >> "$GITHUB_OUTPUT"

      # ── Locate the built APK ───────────────────────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=${APK}" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Automated release created from PR #${{ github.event.pull_request.number }}: **${{ github.event.pull_request.title }}**

            Merged by @${{ github.event.pull_request.merged_by.login }} on ${{ github.event.pull_request.merged_at }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
